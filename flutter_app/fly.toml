app = 'globalbuildestatewebapp-frontend'
primary_region = 'bom'

[build]
  [build.args]
    API_URL = "https://globalbuildestatewebapp-backend.fly.dev"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
